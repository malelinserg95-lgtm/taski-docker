name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  # ---------------- BACKEND TESTS ----------------
  tests:
    name: Run backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Run tests
        run: echo "Тут должны быть тесты backend"

  # ---------------- BACKEND BUILD ----------------
  build_and_push_to_docker_hub:
    name: Push backend Docker image to DockerHub
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend/
          push: true
          tags: malelinserg95/taski_backend:latest

  # ---------------- FRONTEND TESTS ----------------
  frontend_tests:
    name: Run frontend tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd frontend/
          npm ci

      - name: Test frontend
        run: |
          cd frontend/
          npm run test

  # ---------------- FRONTEND BUILD ----------------
  build_frontend_and_push_to_docker_hub:
    name: Push frontend Docker image to DockerHub
    runs-on: ubuntu-latest
    needs: frontend_tests

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/
          push: true
          tags: malelinserg95/taski_frontend:latest

  # ---------------- GATEWAY (NGINX) ----------------
  build_gateway_and_push_to_docker_hub:
    name: Push gateway Docker image to DockerHub
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push gateway
        uses: docker/build-push-action@v5
        with:
          context: ./gateway/
          push: true
          tags: malelinserg95/taski_gateway:latest

  # ---------------- DEPLOY ----------------
  deploy:
    runs-on: ubuntu-latest
    needs:
      - build_and_push_to_docker_hub
      - build_frontend_and_push_to_docker_hub
      - build_gateway_and_push_to_docker_hub

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Copy docker-compose.production.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.production.yml"
          target: "taski"

      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd taski

          sudo docker compose \
            -f docker-compose.production.yml pull

          sudo docker compose \
            -f docker-compose.production.yml down

          sudo docker compose \
            -f docker-compose.production.yml up -d

          sudo docker compose \
            -f docker-compose.production.yml exec \
            backend python manage.py migrate

          sudo docker compose \
            -f docker-compose.production.yml exec \
            backend python manage.py collectstatic

          sudo docker compose \
            -f docker-compose.production.yml exec \
            backend cp -r /app/collected_static/. \
            /backend_static/static/
